<title>Acesso · Agenda Brasil 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00509b;--blue-deep:#003a72;--blue-ink:#012a52;
  --gold:#ba9705;--gold-soft:#d9b84a;--gold-bright:#e7c75b;
  --ink:#231f20;--paper:#eef2f8;
  --display:'Jost','Century Gothic','Futura',system-ui,sans-serif;
  --body:Verdana,'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;font-family:var(--body);
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(165deg,#013164 0%,#012a52 55%,#021d3b 100%);
}
.card{
  position:relative;width:100%;max-width:400px;
  background:linear-gradient(180deg,rgba(8,46,90,.92),rgba(4,30,60,.95));
  border:1px solid rgba(218,184,74,.45);
  border-radius:18px;padding:42px 38px 36px;
  box-shadow:0 24px 70px rgba(0,10,28,.55);
  animation:rise .5s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
/* traços dourados: cantos em L */
.card::before,.card::after{
  content:"";position:absolute;width:30px;height:30px;pointer-events:none;
}
.card::before{top:13px;left:13px;border-top:2px solid var(--gold-soft);border-left:2px solid var(--gold-soft);border-top-left-radius:8px}
.card::after{bottom:13px;right:13px;border-bottom:2px solid var(--gold-soft);border-right:2px solid var(--gold-soft);border-bottom-right-radius:8px}
.logo-wrap{display:flex;justify-content:center;margin-bottom:8px}
.logo-wrap img{height:58px;display:block;border-radius:7px;box-shadow:0 0 0 1px rgba(218,184,74,.4), 0 6px 18px rgba(0,0,0,.28)}
.rule{
  width:64px;height:2px;margin:18px auto 16px;
  background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);
}
.dizeres{
  text-align:center;font-family:var(--display);font-weight:400;
  letter-spacing:.08em;font-size:13px;color:#cfe0f2;margin:0 0 28px;line-height:1.5;
}
.field{margin-bottom:18px}
.field label{
  display:block;font-family:var(--display);font-weight:600;font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px;
}
.field input{
  width:100%;font-family:var(--body);font-size:15px;color:#fff;
  padding:13px 14px;border:1px solid rgba(255,255,255,.16);border-radius:10px;
  background:rgba(255,255,255,.05);transition:.2s;outline:none;
}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field input:focus{
  border-color:var(--gold-soft);background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(218,184,74,.18);
}
.btn{
  width:100%;margin-top:10px;font-family:var(--display);font-weight:600;font-size:15px;
  letter-spacing:.05em;color:var(--blue-ink);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold));
  border:none;border-radius:10px;padding:14px;cursor:pointer;transition:.22s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 6px 18px rgba(186,151,5,.28);
}
.btn:hover{filter:brightness(1.06);box-shadow:0 8px 22px rgba(186,151,5,.38)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.75;cursor:default}
.spin{width:16px;height:16px;border:2px solid rgba(1,42,82,.35);border-top-color:var(--blue-ink);border-radius:50%;animation:sp .7s linear infinite;display:none}
.btn.loading .spin{display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.error{margin-top:15px;text-align:center;font-size:13px;color:#ff9d93;min-height:18px;opacity:0;transition:opacity .2s}
.error.show{opacity:1}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px}
</style>
</head>

        const s1=ror(w[t-2],17)^ror(w[t-2],19)^(w[t-2]>>>10);
        w[t]=(w[t-16]+s0+w[t-7]+s1)>>>0;
      }
      let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
      for(let t=0;t<64;t++){
        const S1=ror(e,6)^ror(e,11)^ror(e,25);
        const ch=(e&f)^(~e&g);
        const t1=(h+S1+ch+K[t]+w[t])>>>0;
        const S0=ror(a,2)^ror(a,13)^ror(a,22);
        const maj=(a&b)^(a&c)^(b&c);
        const t2=(S0+maj)>>>0;
        h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
      }
      h0=(h0+a)>>>0;h1=(h1+b)>>>0;h2=(h2+c)>>>0;h3=(h3+d)>>>0;h4=(h4+e)>>>0;h5=(h5+f)>>>0;h6=(h6+g)>>>0;h7=(h7+h)>>>0;
    }
    const out=new Uint8Array(32),odv=new DataView(out.buffer);
    [h0,h1,h2,h3,h4,h5,h6,h7].forEach((v,i)=>odv.setUint32(i*4,v,false));
    return out;
  };
})();
function hmac(key,msg){
  if(key.length>64)key=sha256(key);
  const k=new Uint8Array(64);k.set(key);
  const ip=new Uint8Array(64),op=new Uint8Array(64);
  for(let i=0;i<64;i++){ip[i]=k[i]^0x36;op[i]=k[i]^0x5c;}
  const inner=new Uint8Array(64+msg.length);inner.set(ip);inner.set(msg,64);
  const ih=sha256(inner);
  const outer=new Uint8Array(96);outer.set(op);outer.set(ih,64);
  return sha256(outer);
}
const enc=new TextEncoder(), dec=new TextDecoder();
const b64d=s=>{const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;};
function ctEq(a,b){if(a.length!==b.length)return false;let d=0;for(let i=0;i<a.length;i++)d|=a[i]^b[i];return d===0;}
async function derK(user,pass,salt,iter){
  const cred=enc.encode(user+"\u001f"+pass);
  const base=await crypto.subtle.importKey("raw",cred,"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},base,256);
  return new Uint8Array(bits);
}
async function tryUnlock(user,pass){
  const salt=b64d(VAULT.salt), ct=b64d(VAULT.ct), tag=b64d(VAULT.tag);
  const K=await derK(user,pass,salt,VAULT.iter);
  const Ke=hmac(K,enc.encode("enc")), Km=hmac(K,enc.encode("mac"));
  if(!ctEq(hmac(Km,ct),tag)) return null;
  const out=new Uint8Array(ct.length);
  const ctr=new Uint8Array(8), dv=new DataView(ctr.buffer);
  let i=0,off=0;
  while(off<ct.length){
    dv.setUint32(0, Math.floor(i/0x100000000),false); dv.setUint32(4, i>>>0,false);
    const blk=hmac(Ke,ctr);
    for(let j=0;j<32&&off<ct.length;j++,off++)out[off]=ct[off]^blk[j];
    i++;
  }
  return dec.decode(out);
}
/* ===== carrega o painel num iframe isolado (sem colisão de escopo) ===== */
function reveal(html){
  const f=document.createElement("iframe");
  f.title="Painel INFRA-BR · Agenda Brasil 2026";
  f.style.cssText="position:fixed;inset:0;width:100%;height:100%;border:0;margin:0;display:block";
  f.srcdoc=html;
  document.documentElement.style.margin="0";
  document.body.style.cssText="margin:0;padding:0;background:#f6f8fb;display:block";
  document.body.replaceChildren(f);
}
const $=s=>document.querySelector(s);
const btn=$("#enter"), errEl=$("#err"), card=$("#card");
function fail(msg){
  errEl.textContent=msg||"Usuário ou senha incorretos.";
  errEl.classList.add("show");
  card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake");
  btn.classList.remove("loading"); btn.disabled=false;
}
async function submit(){
  const u=$("#user").value.trim(), p=$("#pass").value;
  if(!u||!p){fail("Informe usuário e senha.");return;}
  btn.disabled=true; btn.classList.add("loading"); errEl.classList.remove("show");
  try{
    const html=await tryUnlock(u,p);
    if(html===null){fail();$("#pass").select();return;}
    reveal(html);
  }catch(e){ fail("Não foi possível validar o acesso."); }
}
btn.addEventListener("click",submit);
$("#pass").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
$("#user").addEventListener("keydown",e=>{if(e.key==="Enter")$("#pass").focus();});
$("#user").focus();
